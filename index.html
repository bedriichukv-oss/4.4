<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Page</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="product-card" id="product-card" aria-live="polite">
        <p class="status" id="status">Loading product...</p>
      </section>

      <section class="actions">
        <button id="open-modal-btn" class="primary-btn" type="button">
          Open Details Form
        </button>
      </section>
    </main>

    <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-content">
        <button id="close-modal-btn" class="icon-btn" type="button" aria-label="Close dialog">&times;</button>
        <h2 id="modal-title">Submit Form</h2>
        <form id="details-form">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" required />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />

          <button class="primary-btn" type="submit">Submit</button>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
